<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Bug Tracker Dashboard</h2>

<a href="/create" class="btn btn-primary">Create Bug</a>
<a href="/logout" class="btn btn-danger float-end">Logout</a>

<table class="table table-bordered mt-3">
<tr>
<th>ID</th>
<th>Title</th>
<th>Status</th>
<th>Assigned</th>
<th>Action</th>
</tr>

{% for bug in bugs %}
<tr>
<td>{{ bug[0] }}</td>
<td>{{ bug[1] }}</td>

<td>
{% if bug[3]=='Open' %}
<span class="badge bg-warning">Open</span>
{% else %}
<span class="badge bg-success">Resolved</span>
{% endif %}
</td>

<td>{{ bug[5] if bug|length > 5 else '' }}</td>

<td>
<a href="/resolve/{{ bug[0] }}" class="btn btn-success btn-sm">Resolve</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
