<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Bug Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
}
.login-card {
    border-radius: 15px;
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card login-card shadow p-4" style="width: 380px;">

```
<h3 class="text-center mb-2">🐞 Bug Tracker</h3>
<p class="text-center text-muted">Sign in to continue</p>

<!-- Error Message -->
{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<form method="POST">

    <!-- Username -->
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" placeholder="Enter username" required>
    </div>

    <!-- Password -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁️</button>
        </div>
    </div>

    <!-- Remember Me -->
    <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="remember">
        <label class="form-check-label">Remember Me</label>
    </div>

    <!-- Login Button -->
    <button class="btn btn-primary w-100">Login</button>

</form>

<hr>

<p class="text-center mb-0">
    Don't have an account? 
    <a href="/register">Register</a>
</p>
```

</div>

<script>
function togglePassword() {
    var pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
