<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Bug | Bug Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #c3cfe2, #c3cfe2);
    min-height: 100vh;
}
.card {
    border-radius: 15px;
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width: 500px;">

```
<h3 class="text-center mb-3">✏️ Edit Bug</h3>

<!-- Error Message -->
{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<form method="POST" onsubmit="return validateForm()">

    <!-- Title -->
    <div class="mb-3">
        <label class="form-label">Bug Title</label>
        <input id="title" name="title" value="{{bug[1]}}" class="form-control" required>
    </div>

    <!-- Description -->
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea id="desc" name="description" class="form-control" rows="3">{{bug[2]}}</textarea>
    </div>

    <!-- Priority -->
    <div class="mb-3">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-select">
            <option value="Low" {{'selected' if bug[3]=='Low'}}>Low 🟢</option>
            <option value="Medium" {{'selected' if bug[3]=='Medium'}}>Medium 🟡</option>
            <option value="High" {{'selected' if bug[3]=='High'}}>High 🔴</option>
        </select>
    </div>

    <!-- Assigned -->
    <div class="mb-3">
        <label class="form-label">Assigned To</label>
        <input name="assigned" value="{{bug[5]}}" class="form-control">
    </div>

    <!-- Info -->
    <div class="mb-3">
        <small class="text-muted">
            Created: {{bug[6]}} | Last Updated: {{bug[7]}}
        </small>
    </div>

    <!-- Buttons -->
    <div class="d-flex justify-content-between">
        <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
        <button class="btn btn-primary">Update Bug</button>
    </div>

</form>
```

</div>

<script>
function validateForm() {
    let title = document.getElementById("title").value;

    if (title.length < 3) {
        alert("Title must be at least 3 characters");
        return false;
    }
    return true;
}
</script>

</body>
</html>
