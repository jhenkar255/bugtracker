<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Bug Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #43cea2, #185a9d);
    height: 100vh;
}
.register-card {
    border-radius: 15px;
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card register-card shadow p-4" style="width: 400px;">

```
<h3 class="text-center mb-2">🐞 Bug Tracker</h3>
<p class="text-center text-muted">Create a new account</p>

<!-- Error Message -->
{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<form method="POST" onsubmit="return validateForm()">

    <!-- Username -->
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="username" name="username" class="form-control" placeholder="Enter username" required>
    </div>

    <!-- Password -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁️</button>
        </div>
        <small class="text-muted">Min 6 characters</small>
    </div>

    <!-- Confirm Password -->
    <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm" class="form-control" placeholder="Re-enter password" required>
    </div>

    <!-- Role -->
    <div class="mb-3">
        <label class="form-label">Select Role</label>
        <select name="role" class="form-select">
            <option value="admin">Admin</option>
            <option value="staff">Staff</option>
            <option value="customer">Customer</option>
        </select>
    </div>

    <!-- Terms -->
    <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="terms" required>
        <label class="form-check-label">I agree to terms & conditions</label>
    </div>

    <!-- Submit -->
    <button class="btn btn-success w-100">Register</button>

</form>

<hr>

<p class="text-center mb-0">
    Already have an account? 
    <a href="/">Login</a>
</p>
```

</div>

<script>
// Show/Hide Password
function togglePassword() {
    let pwd = document.getElementById("password");
    pwd.type = (pwd.type === "password") ? "text" : "password";
}

// Validation
function validateForm() {
    let pwd = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if (pwd.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    if (pwd !== confirm) {
        alert("Passwords do not match");
        return false;
    }

    return true;
}
</script>

</body>
</html>
